<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM 360 — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-effects { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.35;
            animation: float 18s ease-in-out infinite;
        }
        .bg-orb:nth-child(1) { width: 500px; height: 500px; background: rgba(59,130,246,0.4); top: -100px; left: -100px; }
        .bg-orb:nth-child(2) { width: 450px; height: 450px; background: rgba(139,92,246,0.35); bottom: -80px; right: -80px; animation-delay: -6s; }
        .bg-orb:nth-child(3) { width: 350px; height: 350px; background: rgba(34,197,94,0.3); top: 50%; left: 50%; animation-delay: -12s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.08); }
            66% { transform: translate(-25px, 20px) scale(0.95); }
        }

        /* Login Card */
        .login-container {
            position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo { text-align: center; margin-bottom: 36px; }
        .logo-icon {
            width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: #fff;
            box-shadow: 0 8px 30px rgba(59,130,246,0.35);
        }
        .logo h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
        .logo p { font-size: 13px; color: #64748b; margin-top: 6px; }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600; color: #94a3b8;
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px; font-size: 14px; font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #f1f5f9; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-group input::placeholder { color: #475569; }

        /* Login Button */
        .login-btn {
            width: 100%; padding: 14px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59,130,246,0.4);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Error Message */
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #f87171; padding: 12px 16px; border-radius: 10px; font-size: 13px;
            margin-bottom: 20px; display: none; text-align: center;
        }
        .error-msg.show { display: block; animation: shake 0.4s ease-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Demo Credentials */
        .demo-box {
            margin-top: 28px; padding: 16px; border-radius: 12px;
            background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.12);
        }
        .demo-box h4 { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .demo-row {
            display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px;
        }
        .demo-row .role { color: #94a3b8; }
        .demo-row .cred { color: #3b82f6; font-family: monospace; font-weight: 500; cursor: pointer; }
        .demo-row .cred:hover { color: #60a5fa; }
    </style>
</head>
<body>

<div class="bg-effects"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>

<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">C</div>
            <h1>CRM 360</h1>
            <p>Sign in to your workspace</p>
        </div>

        <div class="error-msg" id="error-msg">Invalid username or password</div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>

        <p style="text-align:center; margin-top:24px; font-size:12px; color:#475569;">
            Contact your admin for login credentials
        </p>
    </div>
</div>

<script>
const API = 'http://localhost:5000/api';

// If already logged in, redirect to dashboard
if (localStorage.getItem('crm_user')) {
    window.location.href = 'dashboard.html';
}

// Handle form submit
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.classList.remove('show');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            localStorage.setItem('crm_user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
        } else {
            errEl.textContent = data.message || 'Invalid username or password';
            errEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    })
    .catch(() => {
        errEl.textContent = 'Server not reachable. Is Flask running?';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
    });
});
</script>
</body>
</html>
